services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: forgepulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgepulse}
      POSTGRES_USER: ${POSTGRES_USER:-forgepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgepulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: forgepulse-redis
    ports:
      - "6379:6379"

  mqtt:
    image: eclipse-mosquitto:2
    container_name: forgepulse-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./deploy/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  kafka:
    image: bitnami/kafka:3.7
    container_name: forgepulse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  platform-api:
    image: forgepulse/platform-api:dev
    build:
      context: ./platform-api
    container_name: forgepulse-api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - kafka

  stream-worker:
    image: forgepulse/stream-worker:dev
    build:
      context: ./stream-worker
    container_name: forgepulse-worker
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mqtt
      - kafka

  edge-gateway:
    image: forgepulse/edge-gateway:dev
    build:
      context: ./edge-gateway
    container_name: forgepulse-edge-gateway
    env_file: .env
    depends_on:
      - mqtt

  web:
    image: forgepulse/web:dev
    build:
      context: ./web
    container_name: forgepulse-web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - platform-api

volumes:
  postgres-data:
